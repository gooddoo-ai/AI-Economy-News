<!DOCTYPE html>

<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 경제 뉴스피드</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0a0a0f; --surface:#12121a; --card:#1a1a26; --card-hover:#1e1e2e;
    --border:rgba(255,255,255,0.07); --accent:#7c6aff; --accent2:#ff6a9b;
    --accent3:#6affd4; --text:#e8e8f0; --muted:#6b6b88;
    --tag-bg:rgba(124,106,255,0.15); --tag-color:#a89fff;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;min-height:100vh;overflow-x:hidden}
  body::before{content:'';position:fixed;inset:0;
    background:radial-gradient(ellipse 80% 60% at 20% 10%,rgba(124,106,255,0.08) 0%,transparent 60%),
               radial-gradient(ellipse 60% 40% at 80% 80%,rgba(255,106,155,0.06) 0%,transparent 50%),
               radial-gradient(ellipse 40% 30% at 60% 40%,rgba(106,255,212,0.04) 0%,transparent 40%);
    pointer-events:none;z-index:0}
  header{position:sticky;top:0;z-index:100;background:rgba(10,10,15,0.9);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 20px}
  .header-inner{max-width:1100px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:60px}
  .logo{display:flex;align-items:center;gap:10px}
  .logo-icon{width:34px;height:34px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:17px}
  .logo-text{font-family:'DM Serif Display',serif;font-size:20px;letter-spacing:-0.5px;background:linear-gradient(90deg,var(--text),var(--muted));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
  .logo-sub{font-size:10px;color:var(--muted);letter-spacing:2px;text-transform:uppercase}
  .header-right{display:flex;align-items:center;gap:12px}
  .live-badge{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted)}
  .live-dot{width:7px;height:7px;background:var(--accent3);border-radius:50%;animation:pulse 2s infinite}
  @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.4;transform:scale(0.8)}}
  .refresh-btn{background:var(--tag-bg);color:var(--tag-color);border:1px solid rgba(124,106,255,0.3);padding:7px 14px;border-radius:20px;font-size:13px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:all 0.2s;display:flex;align-items:center;gap:6px}
  .refresh-btn:hover{background:rgba(124,106,255,0.25)}
  .spin{display:inline-block;animation:spin 0.8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .category-bar{background:rgba(10,10,15,0.7);border-bottom:1px solid var(--border);padding:0 20px;position:sticky;top:60px;z-index:99;backdrop-filter:blur(12px)}
  .category-inner{max-width:1100px;margin:0 auto;display:flex;gap:4px;overflow-x:auto;padding:8px 0;scrollbar-width:none}
  .cat-btn{white-space:nowrap;padding:6px 14px;border-radius:20px;font-size:12px;cursor:pointer;border:1px solid transparent;font-family:'Noto Sans KR',sans-serif;transition:all 0.2s;background:transparent;color:var(--muted)}
  .cat-btn.active{background:var(--tag-bg);color:var(--tag-color);border-color:rgba(124,106,255,0.3)}
  .cat-btn:hover:not(.active){color:var(--text)}
  main{max-width:1100px;margin:0 auto;padding:28px 20px;position:relative;z-index:1}
  .stats-bar{display:flex;gap:20px;padding:0 0 22px;border-bottom:1px solid var(--border);margin-bottom:24px;flex-wrap:wrap;align-items:center}
  .stat{display:flex;flex-direction:column;gap:2px}
  .stat-value{font-size:20px;font-weight:700;font-family:'DM Serif Display',serif;background:linear-gradient(90deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
  .stat-label{font-size:10px;color:var(--muted);letter-spacing:0.5px;text-transform:uppercase}
  .stat-divider{width:1px;background:var(--border);align-self:stretch}
  .date-badge{margin-left:auto;font-size:12px;color:var(--muted);background:rgba(255,255,255,0.04);padding:5px 12px;border-radius:12px;border:1px solid var(--border)}
  #news-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:20px}
  .news-card{background:var(--card);border:1px solid var(--border);border-radius:18px;overflow:hidden;transition:all 0.3s cubic-bezier(0.4,0,0.2,1);animation:fadeUp 0.5s ease both;cursor:pointer}
  @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
  .news-card:hover{background:var(--card-hover);border-color:rgba(124,106,255,0.25);transform:translateY(-3px);box-shadow:0 16px 40px rgba(0,0,0,0.4),0 0 0 1px rgba(124,106,255,0.1)}
  .card-img-wrap{position:relative;width:100%;aspect-ratio:16/9;overflow:hidden}
  .card-img-wrap img{width:100%;height:100%;object-fit:cover;display:block;transition:transform 0.4s ease}
  .news-card:hover .card-img-wrap img{transform:scale(1.04)}
  .img-fallback{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:44px;position:absolute;inset:0;display:none}
  .card-cat-overlay{position:absolute;top:10px;right:10px;background:rgba(0,0,0,0.65);backdrop-filter:blur(6px);border:1px solid rgba(255,255,255,0.1);padding:4px 10px;border-radius:12px;font-size:11px;font-weight:600;color:#fff;letter-spacing:0.3px}
  .card-body{padding:16px 18px 18px}
  .card-meta{display:flex;align-items:center;gap:6px;margin-bottom:10px;flex-wrap:wrap}
  .source-badge{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.3px}
  .meta-dot{color:var(--border)}
  .time-badge{font-size:11px;color:var(--muted)}
  .card-title{font-size:14.5px;font-weight:700;line-height:1.5;margin-bottom:9px;color:var(--text);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .card-summary{font-size:13px;color:#9090b0;line-height:1.75;display:-webkit-box;-webkit-line-clamp:4;-webkit-box-orient:vertical;overflow:hidden}
  .card-footer{display:flex;align-items:center;gap:10px;margin-top:14px;padding-top:12px;border-top:1px solid var(--border);flex-wrap:wrap}
  .sentiment-tag{font-size:11px;font-weight:600;padding:3px 9px;border-radius:10px;white-space:nowrap}
  .sentiment-positive{background:rgba(106,255,212,0.12);color:#6affd4}
  .sentiment-negative{background:rgba(255,100,100,0.12);color:#ff7070}
  .sentiment-neutral{background:rgba(255,255,255,0.07);color:var(--muted)}
  .keywords{display:flex;gap:5px;flex-wrap:wrap;flex:1}
  .keyword{font-size:11px;color:var(--muted);padding:2px 7px;background:rgba(255,255,255,0.04);border-radius:7px;border:1px solid var(--border)}
  .news-card.featured{grid-column:1/-1;display:grid;grid-template-columns:1.2fr 1fr}
  .news-card.featured .card-img-wrap{aspect-ratio:auto;height:100%;min-height:200px}
  .news-card.featured .card-title{font-size:17px;-webkit-line-clamp:3}
  .news-card.featured .card-summary{-webkit-line-clamp:5}
  @media(max-width:650px){.news-card.featured{grid-template-columns:1fr}.news-card.featured .card-img-wrap{height:auto;aspect-ratio:16/9}}
  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:1000;backdrop-filter:blur(10px);align-items:center;justify-content:center;padding:20px}
  .modal-overlay.open{display:flex}
  .modal{background:var(--card);border:1px solid var(--border);border-radius:22px;max-width:660px;width:100%;max-height:88vh;overflow-y:auto;animation:mIn 0.25s ease}
  @keyframes mIn{from{opacity:0;transform:scale(0.96) translateY(8px)}to{opacity:1;transform:scale(1) translateY(0)}}
  .modal-img{width:100%;aspect-ratio:16/9;object-fit:cover;border-radius:18px 18px 0 0;display:block}
  .modal-body{padding:24px}
  .modal-title{font-size:20px;font-weight:700;line-height:1.45;margin-bottom:14px}
  .modal-summary{font-size:14.5px;color:#9090b0;line-height:1.85;margin-bottom:14px}
  .modal-detail{font-size:13.5px;color:#7878a0;line-height:1.8;margin-bottom:18px;padding:12px 14px;background:rgba(124,106,255,0.07);border-radius:10px;border-left:3px solid var(--accent)}
  .modal-close-btn{position:fixed;top:24px;right:24px;background:rgba(20,20,30,0.9);backdrop-filter:blur(8px);border:1px solid var(--border);color:var(--text);width:38px;height:38px;border-radius:50%;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;transition:all 0.2s;z-index:1001}
  .modal-close-btn:hover{background:rgba(124,106,255,0.2)}
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo">
      <div class="logo-icon">🤖</div>
      <div>
        <div class="logo-text">AI 뉴스피드</div>
        <div class="logo-sub">경제 · 기술 · 인공지능</div>
      </div>
    </div>
    <div class="header-right">
      <div class="live-badge"><div class="live-dot"></div><span id="update-time">매일 업데이트</span></div>
      <button class="refresh-btn" onclick="shuffleAndRender()"><span id="ri">↻</span> 새로고침</button>
    </div>
  </div>
</header>

<div class="category-bar">
  <div class="category-inner">
    <button class="cat-btn active" data-cat="all">전체</button>
    <button class="cat-btn" data-cat="반도체">반도체</button>
    <button class="cat-btn" data-cat="생성형AI">생성형 AI</button>
    <button class="cat-btn" data-cat="빅테크">빅테크</button>
    <button class="cat-btn" data-cat="투자">AI 투자</button>
    <button class="cat-btn" data-cat="규제">규제·정책</button>
    <button class="cat-btn" data-cat="자율주행">자율주행</button>
    <button class="cat-btn" data-cat="로봇">로봇공학</button>
  </div>
</div>

<main>
  <div class="stats-bar" id="stats-bar"></div>
  <div id="news-grid"></div>
</main>

<div class="modal-overlay" id="modal" onclick="if(event.target===this)closeModal()">
  <button class="modal-close-btn" onclick="closeModal()">✕</button>
  <div class="modal" id="modal-inner"></div>
</div>

<script>
const NEWS_DB = [
  {id:1,category:'반도체',sentiment:'positive',source:'Bloomberg',published:'2025.03',
   title:'엔비디아 H200, 데이터센터 수요 폭발로 분기 매출 400억 달러 돌파',
   summary:'엔비디아의 H200 GPU가 AI 학습 수요 급증으로 역대 최고 분기 매출을 기록했다. 마이크로소프트·구글·아마존 등 빅테크 3사가 총 500억 달러 규모의 H200 구매 계약을 체결했으며, 공급이 수요를 따라가지 못해 대기 기간이 6개월 이상으로 늘었다. 엔비디아 주가는 발표 당일 8% 급등하며 시가총액 3조 달러를 재돌파했다. TSMC의 CoWoS 패키징 생산 능력 확대가 공급 병목의 핵심 변수로 꼽힌다.',
   detail:'젠슨 황 CEO는 "AI 인프라 투자는 선택이 아닌 필수"라며 2026년 B300 아키텍처 출시를 예고했다.',
   keywords:['H200','데이터센터','GPU'],
   img:'https://images.unsplash.com/photo-1518770660439-4636190af475?w=700&h=394&fit=crop&auto=format'},

  {id:2,category:'반도체',sentiment:'positive',source:'Reuters',published:'2025.04',
   title:'삼성전자 HBM4 양산 성공…엔비디아 공급망 합류 가시화',
   summary:'삼성전자가 HBM4(4세대 고대역폭 메모리) 양산에 성공하며 SK하이닉스의 독주 체제에 도전장을 내밀었다. 엔비디아가 삼성 HBM4 품질 인증 절차를 진행 중이며, 이르면 2025년 하반기부터 공급이 시작될 전망이다. 이번 소식에 삼성전자 주가는 장중 5.2% 급등했다. HBM4는 이전 세대 대비 데이터 전송 속도가 60% 향상됐다.',
   detail:'삼성은 2025년 HBM4 생산 능력을 전년 대비 3배 이상 확대할 계획이다.',
   keywords:['HBM4','삼성','엔비디아'],
   img:'https://images.unsplash.com/photo-1563770660941-84d0b2f5ac90?w=700&h=394&fit=crop&auto=format'},

  {id:3,category:'반도체',sentiment:'negative',source:'Financial Times',published:'2025.06',
   title:'미국 대중국 반도체 수출 통제 강화…ASML도 규제 대상 확대',
   summary:'미국 상무부가 중국 대상 첨단 반도체 장비 수출 통제를 대폭 강화했다. 네덜란드 ASML의 DUV 노광 장비까지 규제 대상에 포함되며 중국 반도체 산업 전반에 충격파가 번졌다. SMIC·CXMT 등 중국 파운드리 업체 주가는 일제히 10% 이상 급락했다. 한국·일본 반도체 장비·소재 업체들도 간접 규제 여파를 피하지 못할 것이라는 우려가 커지고 있다.',
   detail:'중국은 희토류 수출 제한으로 맞대응할 가능성이 있어 글로벌 공급망 불안이 고조되고 있다.',
   keywords:['수출통제','ASML','SMIC'],
   img:'https://images.unsplash.com/photo-1601132359864-fdfbc8b6e7c0?w=700&h=394&fit=crop&auto=format'},

  {id:4,category:'반도체',sentiment:'positive',source:'Wall Street Journal',published:'2025.08',
   title:'인텔 파운드리 18A 공정으로 퀄컴 수주…부활 신호탄',
   summary:'인텔 파운드리 서비스(IFS)가 퀄컴으로부터 18A 공정 기반 모바일 AP 생산 계약을 수주했다. 이는 인텔의 파운드리 전략이 본격 궤도에 오른 첫 번째 대형 수주로, TSMC 독주 구도에 균열이 생길 수 있다는 평가다. 인텔 CEO 팻 겔싱어는 "2026년까지 TSMC N2와 대등한 공정 경쟁력을 갖추겠다"고 밝혔다. 미국 정부의 보조금 지원도 인텔 파운드리 사업의 핵심 동력으로 작용한다.',
   detail:'인텔은 애리조나·오하이오 팹 건설에 총 1,000억 달러 이상을 투자할 계획이다.',
   keywords:['인텔','파운드리','18A'],
   img:'https://images.unsplash.com/photo-1497366216548-37526070297c?w=700&h=394&fit=crop&auto=format'},

  {id:5,category:'반도체',sentiment:'positive',source:'Nikkei',published:'2025.10',
   title:'TSMC 2나노 양산 개시…애플 A19 첫 탑재 확정',
   summary:'TSMC가 2나노(N2) 공정 양산을 공식 개시했다. 애플 A19 프로세서가 N2 공정을 처음 적용하는 제품으로 낙점됐으며, 2026년 아이폰 17 시리즈에 탑재될 예정이다. N2는 N3 대비 전력 효율 30%, 트랜지스터 밀도 15% 개선을 달성했다. TSMC 웨이저자 회장은 "N2 수율이 예상을 상회하고 있어 공급 일정에 차질이 없다"고 밝혔다.',
   detail:'엔비디아와 AMD도 N2 기반 차세대 AI 가속기 칩 생산을 예약한 것으로 알려졌다.',
   keywords:['TSMC','2나노','애플'],
   img:'https://images.unsplash.com/photo-1518770660439-4636190af475?w=700&h=394&fit=crop&auto=format'},

  {id:6,category:'반도체',sentiment:'positive',source:'Reuters',published:'2025.09',
   title:'SK하이닉스 HBM3E 독점 공급…영업이익 20조 원 전망',
   summary:'SK하이닉스가 엔비디아 H200·B200에 탑재되는 HBM3E의 사실상 독점 공급사 지위를 굳히며 2025년 영업이익 20조 원 돌파 전망이 나왔다. HBM3E는 초당 1.2TB의 대역폭을 제공하며 AI 학습 속도를 혁신적으로 높인다. SK하이닉스 주가는 연초 대비 80% 상승하며 코스피 시총 2위로 올라섰다. 청주·이천 M15X 신규 팹 투자도 속도를 내고 있다.',
   detail:'SK하이닉스는 2026년 HBM4 초기 공급에서도 엔비디아 1차 협력사 지위를 유지할 것으로 전망된다.',
   keywords:['SK하이닉스','HBM3E','영업이익'],
   img:'https://images.unsplash.com/photo-1563770660941-84d0b2f5ac90?w=700&h=394&fit=crop&auto=format'},

  {id:7,category:'생성형AI',sentiment:'positive',source:'TechCrunch',published:'2025.03',
   title:'오픈AI GPT-5 출시…추론 능력 기존 대비 10배 향상',
   summary:'오픈AI가 GPT-5를 공식 출시하며 AI 언어 모델 경쟁을 새로운 국면으로 끌어올렸다. GPT-5는 수학·과학 추론에서 박사급 전문가 수준을 최초로 돌파했으며, 멀티모달 처리 능력도 대폭 강화됐다. 출시 첫 주 ChatGPT 유료 구독자가 500만 명 추가로 늘어났고 API 이용 기업도 30% 급증했다. 샘 알트만 CEO는 "AGI까지의 거리가 생각보다 훨씬 가까워졌다"고 말했다.',
   detail:'GPT-5는 o3 추론 모드를 기본 통합하며, 128K 컨텍스트 윈도우를 제공한다.',
   keywords:['GPT-5','오픈AI','추론'],
   img:'https://images.unsplash.com/photo-1677442136019-21780ecad995?w=700&h=394&fit=crop&auto=format'},

const PAGE_SIZE = 12; // 한 번에 보여줄 기사 수
let displayed=[], currentCat='all';
let shownIds = new Set(); // 이미 보여준 기사 ID 추적
let shuffledPool = []; // 전체 셔플된 풀
let poolIndex = 0;     // 다음에 뽑을 위치

function fullShuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function getTodaySeed(){
  const d=new Date();
  return d.getFullYear()*10000+(d.getMonth()+1)*100+d.getDate();
}

// 풀에서 PAGE_SIZE개 뽑기 — 중복 없이, 다 쓰면 다시 셔플
function pickNext(count) {
  const result = [];
  let tries = 0;
  while (result.length < count && tries < NEWS_DB.length * 2) {
    if (poolIndex >= shuffledPool.length) {
      // 전부 소진 → 다시 셔플 후 처음부터
      shuffledPool = fullShuffle(NEWS_DB);
      poolIndex = 0;
      shownIds.clear();
    }
    const item = shuffledPool[poolIndex++];
    if (!shownIds.has(item.id)) {
      shownIds.add(item.id);
      result.push(item);
    }
    tries++;
  }
  return result;
}

function shuffleAndRender(){
  const icon=document.getElementById('ri');
  icon.className='spin';
  setTimeout(()=>{
    displayed = pickNext(PAGE_SIZE);
    renderNews(displayed, currentCat);
    icon.className='';
  },500);
}

function renderNews(news,cat){
  const filtered=cat==='all'?news:news.filter(n=>n.category===cat);
  const grid=document.getElementById('news-grid');
  grid.innerHTML='';

  const pos=filtered.filter(n=>n.sentiment==='positive').length;
  const neg=filtered.filter(n=>n.sentiment==='negative').length;
  const cats=[...new Set(filtered.map(n=>n.category))].length;
  const today=new Date().toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric'});

  document.getElementById('stats-bar').innerHTML=`
    <div class="stat"><div class="stat-value">${filtered.length}</div><div class="stat-label">기사 수</div></div>
    <div class="stat-divider"></div>
    <div class="stat"><div class="stat-value">${cats}</div><div class="stat-label">카테고리</div></div>
    <div class="stat-divider"></div>
    <div class="stat"><div class="stat-value">${pos}</div><div class="stat-label">긍정 전망</div></div>
    <div class="stat-divider"></div>
    <div class="stat"><div class="stat-value">${neg}</div><div class="stat-label">부정 전망</div></div>
    <div class="date-badge">📅 ${today}</div>`;

  filtered.forEach((a,idx)=>{
    const sentLabel=a.sentiment==='positive'?'📈 긍정':a.sentiment==='negative'?'📉 부정':'➡️ 중립';
    const sentClass='sentiment-'+a.sentiment;
    const icon=CAT_ICONS[a.category]||'📰';
    const catColor=CAT_COLORS[a.category]||'#a89fff';
    const card=document.createElement('div');
    card.className='news-card'+(idx===0?' featured':'');
    card.style.animationDelay=(idx*55)+'ms';
    card.onclick=()=>openModal(a);
    card.innerHTML=`
      <div class="card-img-wrap">
        <img src="${a.img}" alt="${a.category}" loading="lazy"
             onerror="this.style.display='none';this.nextElementSibling.style.cssText='display:flex;position:absolute;inset:0;width:100%;height:100%;align-items:center;justify-content:center;font-size:44px;background:var(--surface)'">
        <div class="img-fallback">${icon}</div>
        <div class="card-cat-overlay" style="color:${catColor}">${icon} ${a.category}</div>
      </div>
      <div class="card-body">
        <div class="card-meta">
          <span class="source-badge">${a.source}</span>
          <span class="meta-dot">·</span>
          <span class="time-badge">${a.published}</span>
        </div>
        <div class="card-title">${a.title}</div>
        <div class="card-summary">${a.summary}</div>
        <div class="card-footer">
          <span class="sentiment-tag ${sentClass}">${sentLabel}</span>
          <div class="keywords">${(a.keywords||[]).map(k=>`<span class="keyword">#${k}</span>`).join('')}</div>
        </div>
      </div>`;
    grid.appendChild(card);
  });
}

function openModal(a){
  const sentLabel=a.sentiment==='positive'?'📈 긍정 전망':a.sentiment==='negative'?'📉 부정 전망':'➡️ 중립';
  const sentClass='sentiment-'+a.sentiment;
  const icon=CAT_ICONS[a.category]||'📰';
  document.getElementById('modal-inner').innerHTML=`
    <img class="modal-img" src="${a.img}" alt="" onerror="this.style.display='none'">
    <div class="modal-body">
      <div class="card-meta" style="margin-bottom:12px">
        <span class="source-badge">${a.source}</span>
        <span class="meta-dot">·</span>
        <span class="time-badge">${a.published}</span>
        <span class="sentiment-tag ${sentClass}" style="margin-left:auto">${sentLabel}</span>
      </div>
      <div class="modal-title">${a.title}</div>
      <div class="modal-summary">${a.summary}</div>
      ${a.detail?`<div class="modal-detail">💡 ${a.detail}</div>`:''}
      <div class="keywords">${(a.keywords||[]).map(k=>`<span class="keyword">#${k}</span>`).join('')}</div>
    </div>`;
  document.getElementById('modal').classList.add('open');
  document.body.style.overflow='hidden';
}

function closeModal(){
  document.getElementById('modal').classList.remove('open');
  document.body.style.overflow='';
}

document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal()});

document.querySelectorAll('.cat-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    currentCat=btn.dataset.cat;
    document.querySelectorAll('.cat-btn').forEach(b=>b.classList.toggle('active',b===btn));
    renderNews(displayed,currentCat);
  });
});

// 초기 셔플 풀 구성 후 첫 페이지 표시
shuffledPool = fullShuffle(NEWS_DB);
poolIndex = 0;
displayed = pickNext(PAGE_SIZE);
renderNews(displayed,'all');
const now=new Date();
document.getElementById('update-time').textContent=now.toLocaleDateString('ko-KR',{month:'long',day:'numeric'})+' 업데이트';
</script>
